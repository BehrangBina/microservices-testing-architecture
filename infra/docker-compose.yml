services:

  # ─── SQL Server ────────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "Your_password123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./sqlserver/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Your_password123!", "-Q", "SELECT 1", "-No"]
      interval: 10s
      retries: 10
      start_period: 30s

  # ─── Kafka (KRaft mode, no Zookeeper) ──────────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 20s

  # ─── SQL Server database initialiser (runs once then exits) ──────────────────
  sqlserver-init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "/opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P 'Your_password123!' -i /scripts/init-db.sql &&
       echo 'SQL Server databases initialised.'"
    volumes:
      - ./sqlserver/init-db.sql:/scripts/init-db.sql
    restart: "no"

  # ─── Kafka topic initialiser (runs once then exits) ────────────────────────────
  kafka-init:
    image: apache/kafka:3.9.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic order-created --partitions 3 --replication-factor 1 &&
       /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-processed --partitions 3 --replication-factor 1 &&
       echo 'Topics created.'"
    restart: "no"

  # ─── Microservices ─────────────────────────────────────────────────────────────
  user-service:
    build:
      context: ../services/UserService
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=UserDb;User Id=sa;Password=Your_password123!;TrustServerCertificate=True"
    ports:
      - "5001:8080"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/index.html"]
      interval: 10s
      retries: 5
      start_period: 20s

  order-service:
    build:
      context: ../services/OrderService
      dockerfile: Dockerfile
    container_name: order-service
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=OrderDb;User Id=sa;Password=Your_password123!;TrustServerCertificate=True"
      Kafka__BootstrapServers: "kafka:9092"
    ports:
      - "5002:8080"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/index.html"]
      interval: 10s
      retries: 5
      start_period: 20s

  payment-service:
    build:
      context: ../services/PaymentService
      dockerfile: Dockerfile
    container_name: payment-service
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=PaymentDb;User Id=sa;Password=Your_password123!;TrustServerCertificate=True"
      Kafka__BootstrapServers: "kafka:9092"
    ports:
      - "5003:8080"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/index.html"]
      interval: 10s
      retries: 12
      start_period: 60s

  notification-service:
    build:
      context: ../services/NotificationService
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=NotificationDb;User Id=sa;Password=Your_password123!;TrustServerCertificate=True"
      Kafka__BootstrapServers: "kafka:9092"
    ports:
      - "5004:8080"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/index.html"]
      interval: 10s
      retries: 12
      start_period: 60s

volumes:
  sqlserver_data:
  kafka_data:
